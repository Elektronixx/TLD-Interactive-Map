name: Update Maps

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-maps
  cancel-in-progress: true

jobs:
  update-maps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 22 LTS — fetch built-in, no npm needed

      - name: Run update script
        working-directory: assets/js
        run: node update-maps.js

      - name: Commit and push updated maps.json
        run: |
          if git diff --quiet; then
            echo "No changes to maps.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/maps.json
          git commit -m "Update maps.json"
          git push
